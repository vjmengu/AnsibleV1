- name: shell vs command
  hosts: local
  connection: local
  tasks:
  - name: execute ls on shell module
    ansible.builtin.shell:  ls -ltr > /tmp/ouput.txt
    register: command_result

  - name: print the result from shell module
    ansible.builtin.debug:
      msg: "{{ command_result }}"

  - name: this is cmd module
    ansible.builtin.command: ls -la
    register: cmd_result

  - name: print output from cmd module
    ansible.builtin.debug:
      msg: "{{ cmd_result }}"

